version: "3.9"

services:

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: portfolio-frontend
    restart: unless-stopped
    ports:
      - "6080:80"
    volumes:
      - portfolio-data:/usr/share/nginx/html/data
    depends_on:
      - proxy

  proxy:
    build:
      context: .
      dockerfile: Dockerfile.proxy
    container_name: portfolio-proxy
    restart: unless-stopped
    volumes:
      - portfolio-data:/app/data
    environment:
      - TZ=Europe/Amsterdam

volumes:
  portfolio-data:
    driver: local
