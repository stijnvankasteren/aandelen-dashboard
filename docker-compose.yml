version: "3.9"

services:

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: portfolio-analyse-frontend:latest
    container_name: portfolio-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - proxy

  proxy:
    build:
      context: .
      dockerfile: Dockerfile.proxy
    image: portfolio-analyse-proxy:latest
    container_name: portfolio-proxy
    restart: unless-stopped
    volumes:
      - portfolio-data:/app/data
    environment:
      - TZ=Europe/Amsterdam

volumes:
  portfolio-data:
    driver: local
