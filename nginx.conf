server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Stuur /proxy/* door naar de Python proxy container
    # De frontend gebruikt /proxy/t212/... en /proxy/degiro/... en /proxy/s3download
    location /proxy/ {
        proxy_pass http://proxy:8081/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Stuur data/*.json door naar de proxy container zodat altijd de live data geserveerd wordt
    location /data/ {
        proxy_pass http://proxy:8081/data/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass 1;
        add_header Cache-Control "no-store";
    }

    # Alle andere requests: statische bestanden serveren
    location / {
        try_files $uri $uri/ /index.html;
    }
}
